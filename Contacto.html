        <section class="cardContacto">
            <section class="contacto letraEspecial">
                <h1>Contáctanos</h1>
                <p>Si tienes alguna consulta o deseas más información, completa el siguiente formulario:</p>
                <form action="#" method="post">
                    <label for="nombre">Nombre:</label>
                    <input type="text" id="nombre" name="nombre" placeholder="Tu nombre" required>
                    
                    <label for="email">Correo Electrónico:</label>
                    <input type="email" id="email" name="email" placeholder="Tu correo electrónico" required>
                    
                    <label for="mensaje">Mensaje:</label>
                    <textarea id="mensaje" name="mensaje" placeholder="Escribe tu mensaje aquí" rows="5" required></textarea>
                    
                    <a href="index.html" class="boton">Enviar</a>
                </form>
            </section>
        </section>
